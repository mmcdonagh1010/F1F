name: AI Issue To PR

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to process
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-fix:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'ai-fix')
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install repo dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Install AI coding agent
        run: pip install aider-chat

      - name: Load issue payload
        id: issue
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(process.env.ISSUE_NUMBER)
              : context.payload.issue.number;

            if (!issueNumber) {
              throw new Error('A valid issue number is required.');
            }

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const filteredComments = comments.filter((comment) => {
              const login = comment?.user?.login || comment?.author?.login || '';
              const body = comment?.body || '';

              if (login === 'github-actions[bot]' && body.includes('Opened AI fix PR for review:')) {
                return false;
              }

              return true;
            });

            const tempDir = process.env.RUNNER_TEMP || path.join(process.cwd(), 'tmp');
            fs.mkdirSync(tempDir, { recursive: true });
            const inputPath = path.join(tempDir, 'ai-issue-input.json');
            const promptPath = path.join(tempDir, 'ai-issue-prompt.md');
            fs.writeFileSync(
              inputPath,
              JSON.stringify({
                repository: { owner: context.repo.owner, name: context.repo.repo },
                issue: {
                  number: issue.number,
                  title: issue.title,
                  body: issue.body,
                  labels: (issue.labels || []).map((label) => typeof label === 'string' ? label : label.name),
                },
                comments: filteredComments,
              }, null, 2)
            );

            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_title', issue.title);
            core.setOutput('input_path', inputPath);
            core.setOutput('prompt_path', promptPath);

      - name: Build AI prompt
        run: node scripts/build-ai-issue-prompt.mjs "${{ steps.issue.outputs.input_path }}" "${{ steps.issue.outputs.prompt_path }}"

      - name: Verify AI provider configuration
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Set OPENAI_API_KEY or ANTHROPIC_API_KEY in repository secrets." >&2
            exit 1
          fi

      - name: Run AI issue fixer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIDER_MODEL: ${{ vars.AI_AGENT_MODEL }}
        run: |
          aider \
            --yes-always \
            --no-auto-commits \
            --no-dirty-commits \
            --no-gitignore \
            --model "${AIDER_MODEL:-gpt-4.1}" \
            --message-file "${{ steps.issue.outputs.prompt_path }}"

      - name: Remove AI tool artifacts
        run: |
          rm -f .aider.chat.history.md
          rm -rf .aider.tags.cache.v4

      - name: Validate generated changes
        run: node scripts/validate-pr.mjs

      - name: Detect repository changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: create-pr
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/issue-${{ steps.issue.outputs.issue_number }}
          base: main
          delete-branch: true
          commit-message: 'Fix issue #${{ steps.issue.outputs.issue_number }} via AI agent'
          title: 'Fix issue #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}'
          body: |
            Automated AI-generated fix for #${{ steps.issue.outputs.issue_number }}.

            Validation completed before opening this PR:
            - npm --prefix backend run validate
            - npm --prefix frontend run build

            Closes #${{ steps.issue.outputs.issue_number }}
          labels: |
            ai-generated
            needs-review

      - name: Comment on issue with pull request link
        if: steps.create-pr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.issue.outputs.issue_number }}'),
              body: `Opened AI fix PR for review: ${{ steps.create-pr.outputs.pull-request-url }}`,
            });

      - name: Comment when no code changes were produced
        if: steps.diff.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.issue.outputs.issue_number }}'),
              body: 'AI automation ran, but no code changes were produced. Review the issue details or tighten the scope before retrying.',
            });